<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — Pietro Milli</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <style>
    nav.main-nav {
      margin: 1.5em 0;
      border-bottom: 1px solid #ddd;
      padding-bottom: 0.8em;
    }
    nav.main-nav a {
      margin-right: 1.5em;
      font-weight: bold;
      text-decoration: none;
      color: #333;
    }
    nav.main-nav a:hover,
    nav.main-nav a.active {
      color: #000;
      border-bottom: 2px solid #000;
      padding-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <h1><a href="/">Pietro Milli</a></h1>
    </header>

    <nav class="main-nav">
      <a href="/publications" {% if page.url == '/publications' %}class="active"{% endif %}>Publications</a>
      <a href="/accompagnement" {% if page.url == '/accompagnement' %}class="active"{% endif %}>Accompagnement</a>
      <a href="/contact" {% if page.url == '/contact' %}class="active"{% endif %}>Contact</a>
    </nav>

    <section>
      {{ content }}
    </section>

    <footer>
      <p>GitHub Pages · © 2026</p>
    </footer>
  </div>
</body>
</html>
